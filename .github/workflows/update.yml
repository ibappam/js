name: Auto Update Movie Config

on:
  schedule:
    - cron: '*/15 * * * *' # Triggers every 15 minutes
  workflow_dispatch: # Adds a button to trigger it manually

jobs:
  update-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save the file to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper Script
        run: node update.js

      - name: Commit and Push File
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add config.js
          
          # This ensures it only commits if the domain actually changed, keeping history clean
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update config.js" && git push)
