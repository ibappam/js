name: Auto Update Movie Config

on:
  schedule:
    # Runs at minute 0 past every 3rd hour (e.g., 00:00, 03:00, 06:00, etc.)
    - cron: '0 */3 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main # Keep on main to execute the script

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper Script
        run: node update.js

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          # Excludes backend scripts and github folders from the public gh-pages branch
          exclude_assets: '.github,update.js,package.json,package-lock.json'
